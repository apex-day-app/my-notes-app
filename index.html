<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notes App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }
    body {
        background: #f0ede8;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        padding: 0px;
        min-height: 100vh;
        padding-bottom: 80px;
    }
    .app {
        max-width: 550px;
        margin: 0 10px;
        background: transparent;
    }
    .folder-scroll {
        background: #4a4a4a;
        padding: 4px 0px;
        margin-bottom: 10px;
        overflow-x: auto;
        white-space: nowrap;
        display: flex;
        gap: 2px;
        border-radius: 0px;
    }
    .folder-item {
        display: inline-flex;
        align-items: center;
        background: linear-gradient(to bottom, #7a7a7a, #5a5a5a);
        padding: 3px 16px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #f0f0f0;
        cursor: pointer;
        border-radius: 0px;
        box-shadow: 0 3px 0 #3a3a3a;
        transition: all 0.05s linear;
        gap: 5px;
    }
    .folder-item i {
        font-size: 11px;
        color: #ffd966;
    }
    .folder-item.active {
        background: linear-gradient(to bottom, #5a5a5a, #4a4a4a);
        box-shadow: 0 1px 0 #3a3a3a;
        transform: translateY(2px);
    }
    .folder-item:active {
        background: linear-gradient(to bottom, #5a5a5a, #4a4a4a);
        box-shadow: 0 1px 0 #3a3a3a;
        transform: translateY(2px);
    }
    .note-item {
        background: #ffffff;
        border-radius: 20px;
        border: 1px solid #e8e0d5;
        padding: 14px 5px;
        cursor: pointer;
        position: relative;
        transition: all 0.2s;
    }
    .note-item.empty-note {
        background: transparent;
        border: none;
        padding: 0px;
        margin: 0px;
    }
    .note-item.selected {
        background: #e8f5e9;
        border: 2px solid #4caf50;
    }
    .note-number {
        display: inline;
        background: none;
        color: #888;
        font-size: 0.8rem;
        font-weight: normal;
        width: auto;
        height: auto;
        border-radius: 0;
        margin-right: 5px;
    }
    .note-title {
        font-size: 1rem;
        font-weight: 600;
        color: #2c241a;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        background: #f5f0ea;
        padding: 6px 10px;
        border-radius: 12px;
    }
    .note-title i {
        margin-right: 8px;
        color: #b97f44;
        font-size: 16px;
    }
    .note-preview {
        font-size: 0.75rem;
        color: #6b5340;
        line-height: 1.4;
        white-space: pre-wrap;
        margin-bottom: 12px;
        border-left: 2px solid #ffe0b5;
        padding-left: 10px;
    }
    .note-footer {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
    }
    .note-footer button {
        background: #f7f3ec;
        border: none;
        padding: 8px 12px;
        border-radius: 40px;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s;
        min-width: 44px;
    }
    .note-footer button i {
        font-size: 14px;
        color: #b97f44;
        margin-right: 4px;
    }
    .note-footer button.copied {
        background: #4caf50;
    }
    .note-footer button.copied i {
        color: white;
    }
    textarea, input {
        touch-action: manipulation;
        font-size: 16px;
        font-family: inherit;
    }
    
    /* ========================================
       NEW EMPTY NOTE CARD DESIGN
    ======================================== */
    .empty-card {
        background: #ffffff;
        border-radius: 20px;
        border: 1px solid #e8e0d5;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        transition: all 0.2s ease;
    }
    .empty-card-header {
        background: linear-gradient(135deg, #6b8c5c, #4a6b3a);
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .empty-card-header span {
        color: #ffffff;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.5px;
    }
    .empty-card-header i {
        color: #ffd966;
        font-size: 16px;
    }
    .empty-card-body {
        padding: 16px;
        background: #ffffff;
    }
    .empty-title-input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #e8e0d5;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 500;
        background: #fefaf5;
        margin-bottom: 12px;
        outline: none;
        transition: all 0.2s;
        font-family: inherit;
    }
    .empty-title-input:focus {
        border-color: #6b8c5c;
        background: #ffffff;
    }
    .empty-title-input::placeholder {
        color: #b0a088;
        font-weight: normal;
    }
    .empty-text-input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #e8e0d5;
        border-radius: 12px;
        font-size: 14px;
        background: #fefaf5;
        min-height: 100px;
        resize: vertical;
        outline: none;
        transition: all 0.2s;
        font-family: inherit;
        line-height: 1.5;
    }
    .empty-text-input:focus {
        border-color: #6b8c5c;
        background: #ffffff;
    }
    .empty-text-input::placeholder {
        color: #b0a088;
    }
    .empty-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 16px;
    }
    .empty-actions button {
        background: #ffd966;
        border: none;
        padding: 8px 20px;
        border-radius: 30px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        color: #4a3a2a;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }
    .empty-actions button:active {
        transform: scale(0.96);
    }
    .input-wrapper {
        position: relative;
        width: 100%;
        margin-bottom: 0px;
    }
    .paste-btn-inside {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: #f0ebe4;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        padding: 6px 10px;
        font-size: 12px;
        color: #8b6946;
        display: flex;
        align-items: center;
        gap: 4px;
        transition: all 0.2s;
    }
    .paste-btn-inside i {
        font-size: 12px;
    }
    .paste-btn-inside:active {
        background: #e0d6c8;
    }
    .input-wrapper textarea + .paste-btn-inside {
        top: 12px;
        transform: none;
    }
    .copy-btn-inside {
        position: absolute;
        right: 80px;
        top: 50%;
        transform: translateY(-50%);
        background: #f0ebe4;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        padding: 6px 10px;
        font-size: 12px;
        color: #8b6946;
        display: flex;
        align-items: center;
        gap: 4px;
        transition: all 0.2s;
    }
    .copy-btn-inside i {
        font-size: 12px;
    }
    .copy-btn-inside:active {
        background: #e0d6c8;
    }
    .input-wrapper textarea + .copy-btn-inside {
        top: 12px;
        transform: none;
    }
    
    /* Fullscreen Modal */
    .fullscreen-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
        z-index: 2000;
        display: flex;
        flex-direction: column;
        padding: 20px;
        overflow-y: auto;
    }
    .fullscreen-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 16px;
        border-bottom: 1px solid #eee;
        margin-bottom: 20px;
    }
    .fullscreen-header input {
        font-size: 1.3rem;
        font-weight: 600;
        border: none;
        background: transparent;
        width: 80%;
        outline: none;
        font-family: inherit;
    }
    .fullscreen-close {
        background: none;
        border: none;
        font-size: 1.8rem;
        cursor: pointer;
        color: #8b6946;
        padding: 8px;
    }
    .fullscreen-content {
        flex: 1;
        font-size: 1rem;
        line-height: 1.6;
        outline: none;
        white-space: pre-wrap;
        min-height: 200px;
    }
    
    /* Modal */
    .modal-mask {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }
    .modal-card {
        background: white;
        width: 85%;
        max-width: 350px;
        border-radius: 28px;
        padding: 20px;
    }
    .modal-card h3 {
        font-size: 1.1rem;
        margin-bottom: 12px;
    }
    .modal-card input, .modal-card textarea {
        width: 100%;
        margin: 8px 0;
        padding: 10px 14px;
        border-radius: 20px;
        border: 1px solid #ddd;
        font-family: inherit;
        font-size: 0.9rem;
    }
    .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 12px;
    }
    .modal-actions button {
        padding: 8px 20px;
        border-radius: 30px;
        border: none;
        cursor: pointer;
        font-size: 0.85rem;
    }
    
    /* Toast Message */
    .toast {
        position: fixed;
        bottom: auto;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        background: #2c3e2f;
        color: white;
        padding: 10px 20px;
        border-radius: 50px;
        font-size: 0.85rem;
        z-index: 1100;
        animation: slideUpFade 0.8s ease forwards;
        white-space: nowrap;
    }
    @keyframes slideUpFade {
        0% { opacity: 1; transform: translateX(-50%) translateY(0); }
        70% { opacity: 1; transform: translateX(-50%) translateY(-10px); }
        100% { opacity: 0; transform: translateX(-50%) translateY(-30px); visibility: hidden; }
    }
    
    /* Selection Toolbar */
    .selection-toolbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: #4a4a4a;
        padding: 4px 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 100;
        transform: translateY(-100%);
        transition: transform 0.3s ease;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .selection-toolbar.show {
        transform: translateY(0);
    }
    .selection-count {
        display: inline-block;
        color: #ffd966;
        font-size: 13px;
        font-weight: bold;
        background: #3a3a3a;
        padding: 4px 10px;
        border-radius: 0px;
        box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
    }
    .selection-buttons {
        display: flex;
        gap: 8px;
    }
    .selection-toolbar button {
        background: linear-gradient(to bottom, #7a7a7a, #5a5a5a);
        padding: 4px 12px;
        border-radius: 0px;
        border: none;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        min-width: 55px;
        color: #f0f0f0;
        box-shadow: 0 2px 0 #3a3a3a;
        transition: all 0.05s linear;
    }
    .selection-toolbar button:active {
        transform: translateY(2px);
        box-shadow: 0 0px 0 #3a3a3a;
    }
    .delete-btn { background: linear-gradient(to bottom, #c93a2a, #a91a0a); box-shadow: 0 2px 0 #6a0a00; }
    .select-all-btn { background: linear-gradient(to bottom, #3a6a9a, #1a4a7a); box-shadow: 0 2px 0 #002a4a; }
    .cancel-btn { background: linear-gradient(to bottom, #6a6a6a, #4a4a4a); box-shadow: 0 2px 0 #2a2a2a; }
    
    .notes-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }
    </style>
</head>
<body>
<div id="foldersList" class="folder-scroll"></div>
<div class="app">
    <div class="notes-container">
        <div id="notesListArea" class="notes-list"></div>
    </div>
</div>

<!-- Selection Mode Elements -->
<div class="selection-toolbar" id="selectionToolbar">
    <span class="selection-count" id="selectionCount">0</span>
    <div class="selection-buttons">
        <button class="select-all-btn" id="selectAllBtn"><i class="fas fa-check-double"></i> All</button>
        <button class="delete-btn" id="deleteSelectedBtn"><i class="fas fa-trash-alt"></i> Delete</button>
        <button class="cancel-btn" id="cancelSelectionBtn"><i class="fas fa-times"></i> Cancel</button>
    </div>
</div>

<script>
    let folders = [];
    let notes = [];
    let currentFolderId = null;

    function getEmptyNoteId(folderId) { return 'empty_' + folderId; }
    function isEmptyNote(note) { return note.id && note.id.toString().startsWith('empty_'); }

    function ensureEmptyNoteForAllFolders() {
        folders.forEach(folder => {
            const emptyId = getEmptyNoteId(folder.id);
            const existingEmpty = notes.find(n => n.id === emptyId);
            if (!existingEmpty) {
                notes.push({ id: emptyId, folderId: folder.id, title: "", content: "", isEmpty: true });
            }
        });
        notes = notes.filter(note => {
            if (note.id && note.id.toString().startsWith('empty_')) {
                const folderId = note.id.toString().replace('empty_', '');
                return folders.some(f => f.id === folderId);
            }
            return true;
        });
    }

    function loadFromLocal() {
        const rawFolders = localStorage.getItem('notes_folders');
        const rawNotes = localStorage.getItem('notes_notes');
        if(rawFolders) folders = JSON.parse(rawFolders);
        else folders = [{ id: 'f1', name: 'Main' }];
        if(rawNotes) notes = JSON.parse(rawNotes);
        else notes = [];
        if(folders.length && !currentFolderId) currentFolderId = folders[0].id;
        if(!folders.find(f => f.id === currentFolderId)) currentFolderId = folders[0]?.id;
        ensureEmptyNoteForAllFolders();
        saveToLocal();
    }
    
    function saveToLocal() {
        localStorage.setItem('notes_folders', JSON.stringify(folders));
        localStorage.setItem('notes_notes', JSON.stringify(notes));
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;';
            return m;
        });
    }
    
    function showToast(msg, isSuccess = false) {
        let t = document.querySelector('.toast');
        if(t) t.remove();
        let div = document.createElement('div');
        div.className = 'toast';
        div.innerHTML = `<i class="fas ${isSuccess ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${msg}`;
        if(isSuccess) div.style.background = "#4caf50";
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }

    function renderFolders() {
        const container = document.getElementById('foldersList');
        container.innerHTML = '';
        folders.forEach(folder => {
            const folderSpan = document.createElement('span');
            folderSpan.className = `folder-item ${currentFolderId === folder.id ? 'active' : ''}`;
            folderSpan.innerHTML = `<i class="fas fa-folder"></i> ${escapeHtml(folder.name)}`;
            folderSpan.addEventListener('click', () => {
                currentFolderId = folder.id;
                fullRender();
            });
            container.appendChild(folderSpan);
        });
        const addBtn = document.createElement('span');
        addBtn.className = 'folder-item';
        addBtn.innerHTML = '<i class="fas fa-plus"></i>';
        addBtn.style.cssText = 'display: inline-flex; align-items: center; background: linear-gradient(to bottom, #d4942a, #a86a0a); padding: 3px 16px; font-size: 0.75rem; font-weight: 600; color: #ffffff; cursor: pointer; border-radius: 0px; box-shadow: 0 3px 0 #6a3a00; gap: 5px;';
        addBtn.addEventListener('click', () => { let name = prompt("Folder name:"); if(name && name.trim()) { folders.push({ id: 'f_' + Date.now(), name: name.trim() }); currentFolderId = folders[folders.length-1].id; ensureEmptyNoteForAllFolders(); saveToLocal(); fullRender(); showToast("Folder created", true); } });
        container.appendChild(addBtn);
    }

    // Selection Mode Variables
    let selectionMode = false;
    let selectedNotes = new Set();
    let longPressTimer = null;

    function updateSelectionCount() {
        document.getElementById('selectionCount').innerText = selectedNotes.size;
        let allNotes = document.querySelectorAll('.note-item:not(.empty-note)');
        let selectAllBtn = document.getElementById('selectAllBtn');
        if (selectAllBtn) {
            if (selectedNotes.size === allNotes.length && allNotes.length > 0) selectAllBtn.innerHTML = '<i class="fas fa-times-circle"></i> Deselect';
            else selectAllBtn.innerHTML = '<i class="fas fa-check-double"></i> All';
        }
    }

    function toggleSelectionMode() {
        selectionMode = !selectionMode;
        selectedNotes.clear();
        if(selectionMode) {
            document.getElementById('selectionToolbar').classList.add('show');
            document.querySelectorAll('.note-item:not(.empty-note)').forEach(item => {
                item.style.cursor = 'pointer';
            });
        } else {
            document.getElementById('selectionToolbar').classList.remove('show');
            document.querySelectorAll('.note-item').forEach(item => {
                item.classList.remove('selected');
                item.style.cursor = '';
            });
        }
        updateSelectionCount();
    }

    function toggleNoteSelection(noteId, element) {
        if(!selectionMode) return;
        if(selectedNotes.has(noteId)) {
            selectedNotes.delete(noteId);
            element.classList.remove('selected');
        } else {
            selectedNotes.add(noteId);
            element.classList.add('selected');
        }
        updateSelectionCount();
    }

    function renderNotes() {
        const container = document.getElementById('notesListArea');
        let folderNotes = notes.filter(n => n.folderId === currentFolderId);
        folderNotes.sort((a, b) => {
            if (isEmptyNote(a) && !isEmptyNote(b)) return -1;
            if (!isEmptyNote(a) && isEmptyNote(b)) return 1;
            if (!isEmptyNote(a) && !isEmptyNote(b)) {
                const timeA = parseInt(a.id.split('_')[0]) || 0;
                const timeB = parseInt(b.id.split('_')[0]) || 0;
                return timeB - timeA;
            }
            return 0;
        });
        
        let validNotes = folderNotes.filter(n => !isEmptyNote(n));
        for(let i = 0; i < validNotes.length; i++) {
            validNotes[i].displayNumber = validNotes.length - i;
        }
        
        container.innerHTML = '';
        folderNotes.forEach(note => {
            const isEmpty = isEmptyNote(note);
            const card = document.createElement('div');
            card.className = `note-item ${isEmpty ? 'empty-note' : ''}`;
            
            if (isEmpty) {
                const uid = note.id;
                card.innerHTML = `
                    <div class="empty-card">
                        <div class="empty-card-header">
                            <span><i class="fas fa-pen-alt" style="margin-right: 6px;"></i> Create New Note</span>
                            <i class="fas fa-edit"></i>
                        </div>
                        <div class="empty-card-body">
                            <div class="input-wrapper">
                                <input type="text" id="title_${uid}" placeholder="Note title..." class="empty-title-input">
                                <button class="copy-title-btn copy-btn-inside" data-id="${uid}"><i class="fas fa-copy"></i> Copy</button>
                                <button class="paste-title-btn paste-btn-inside" data-id="${uid}"><i class="fas fa-paste"></i> Paste</button>
                            </div>
                            <div class="input-wrapper">
                                <textarea id="text_${uid}" placeholder="Write your note content here..." class="empty-text-input"></textarea>
                                <button class="copy-text-btn copy-btn-inside" data-id="${uid}"><i class="fas fa-copy"></i> Copy</button>
                                <button class="paste-text-btn paste-btn-inside" data-id="${uid}"><i class="fas fa-paste"></i> Paste</button>
                            </div>
                            <div class="empty-actions">
                                <button class="save-empty-btn" data-id="${uid}"><i class="fas fa-save"></i> Save Note</button>
                            </div>
                        </div>
                    </div>`;
                setTimeout(() => {
                    const ta = document.getElementById(`text_${uid}`);
                    if(ta) ta.addEventListener('keydown', (e) => { if((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); document.querySelector(`.save-empty-btn[data-id="${uid}"]`).click(); } });
                }, 10);
            } else {
                let preview = "";
                if(note.content) {
                    preview = note.content.substring(0, 65);
                    if(preview.length > 62) preview = preview.slice(0, 60) + "...";
                }
                card.innerHTML = `
                    <div class="note-title">
                        <span class="note-number">${note.displayNumber}. </span>
                        <i class="fas fa-file-alt"></i>
                        ${escapeHtml(note.title)}
                    </div>
                    <div class="note-preview">${escapeHtml(preview)}</div>
                    <div class="note-footer">
                        <button class="copy-title" data-id="${note.id}" title="Copy Title"><i class="fas fa-copy"></i> Title</button>
                        <button class="copy-content" data-id="${note.id}" title="Copy Content"><i class="fas fa-copy"></i> Content</button>
                        <button class="edit-note" data-id="${note.id}"><i class="fas fa-edit"></i></button>
                        <button class="delete-note" data-id="${note.id}"><i class="fas fa-trash-alt"></i></button>
                    </div>`;
                
                card.addEventListener('touchstart', (e) => {
                    if(!selectionMode && !isEmpty) {
                        longPressTimer = setTimeout(() => {
                            toggleSelectionMode();
                            const noteId = note.id;
                            selectedNotes.add(noteId);
                            card.classList.add('selected');
                            updateSelectionCount();
                        }, 500);
                    }
                });
                card.addEventListener('touchend', () => {
                    clearTimeout(longPressTimer);
                });
                card.addEventListener('touchmove', () => {
                    clearTimeout(longPressTimer);
                });
                
                card.addEventListener('click', (e) => {
                    if(selectionMode) {
                        e.stopPropagation();
                        toggleNoteSelection(note.id, card);
                    } else {
                        if(e.target.closest('.copy-title') || e.target.closest('.copy-content') || e.target.closest('.edit-note') || e.target.closest('.delete-note')) {
                            return;
                        }
                        openFullscreenNote(note);
                    }
                });
            }
            container.appendChild(card);
        });

        document.querySelectorAll('.save-empty-btn').forEach(btn => {
            btn.onclick = () => {
                const id = btn.getAttribute('data-id');
                const found = notes.find(n => n.id === id);
                if(found && isEmptyNote(found)) {
                    const titleVal = document.getElementById(`title_${id}`).value.trim();
                    const contentVal = document.getElementById(`text_${id}`).value.trim();
                    if(contentVal) {
                        const finalTitle = titleVal || contentVal.split(/\r?\n/)[0].substring(0,40) || "Note";
                        notes.push({ id: Date.now()+'_'+Math.random(), folderId: currentFolderId, title: finalTitle, content: contentVal });
                        saveToLocal();
                        document.getElementById(`title_${id}`).value = '';
                        document.getElementById(`text_${id}`).value = '';
                        renderNotes();
                        showToast("Note saved", true);
                    } else showToast("Write something");
                }
            };
        });
        
        document.querySelectorAll('.paste-title-btn').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.getAttribute('data-id');
                const input = document.getElementById(`title_${id}`);
                if(input) {
                    try {
                        const text = await navigator.clipboard.readText();
                        if(text && text.trim()) { input.value = text; showToast("Pasted", true); }
                        else showToast("Empty");
                    } catch(e) { showToast("Allow permission"); }
                }
            };
        });
        document.querySelectorAll('.paste-text-btn').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.getAttribute('data-id');
                const textarea = document.getElementById(`text_${id}`);
                if(textarea) {
                    try {
                        const text = await navigator.clipboard.readText();
                        if(text && text.trim()) { textarea.value = text; showToast("Pasted", true); }
                        else showToast("Empty");
                    } catch(e) { showToast("Allow permission"); }
                }
            };
        });
        
        document.querySelectorAll('.copy-title-btn').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.getAttribute('data-id');
                const input = document.getElementById(`title_${id}`);
                if (input && input.value.trim()) {
                    await navigator.clipboard.writeText(input.value);
                    showToast("Title copied", true);
                } else showToast("Nothing to copy");
            };
        });
        
        document.querySelectorAll('.copy-text-btn').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.getAttribute('data-id');
                const textarea = document.getElementById(`text_${id}`);
                if (textarea && textarea.value.trim()) {
                    await navigator.clipboard.writeText(textarea.value);
                    showToast("Text copied", true);
                } else showToast("Nothing to copy");
            };
        });
        
        document.querySelectorAll('.copy-title').forEach(btn => {
            btn.onclick = async (e) => {
                e.stopPropagation();
                const n = notes.find(x => x.id === btn.getAttribute('data-id'));
                if(n?.title) {
                    await navigator.clipboard.writeText(n.title);
                    btn.classList.add('copied');
                    showToast("Title copied", true);
                    setTimeout(() => btn.classList.remove('copied'), 800);
                }
            };
        });
        document.querySelectorAll('.copy-content').forEach(btn => {
            btn.onclick = async (e) => {
                e.stopPropagation();
                const n = notes.find(x => x.id === btn.getAttribute('data-id'));
                if(n?.content) {
                    await navigator.clipboard.writeText(n.content);
                    btn.classList.add('copied');
                    showToast("Content copied", true);
                    setTimeout(() => btn.classList.remove('copied'), 800);
                }
            };
        });
        
        document.querySelectorAll('.edit-note').forEach(btn => {
            btn.onclick = (e) => { e.stopPropagation(); const n = notes.find(x=>x.id===btn.getAttribute('data-id')); if(n) openEditModal(n); };
        });
        
        document.querySelectorAll('.delete-note').forEach(btn => {
            btn.onclick = (e) => { e.stopPropagation(); const id = btn.getAttribute('data-id'); if(confirm("Delete?")){ notes = notes.filter(x=>x.id!==id); saveToLocal(); renderNotes(); showToast("Deleted"); } };
        });
    }

    document.getElementById('selectAllBtn').onclick = () => {
        let allNotes = document.querySelectorAll('.note-item:not(.empty-note)');
        if(selectedNotes.size === allNotes.length && allNotes.length > 0) {
            selectedNotes.clear();
            allNotes.forEach(n => n.classList.remove('selected'));
        } else {
            allNotes.forEach(n => {
                let id = n.querySelector('.copy-title')?.getAttribute('data-id');
                if(id) { selectedNotes.add(id); n.classList.add('selected'); }
            });
        }
        updateSelectionCount();
    };
    document.getElementById('deleteSelectedBtn').onclick = () => {
        if(selectedNotes.size === 0) return showToast("No notes selected");
        if(confirm("Delete " + selectedNotes.size + " note(s)?")) {
            notes = notes.filter(n => !selectedNotes.has(n.id));
            saveToLocal();
            renderNotes();
            toggleSelectionMode();
            showToast("Deleted", true);
        }
    };
    document.getElementById('cancelSelectionBtn').onclick = toggleSelectionMode;

    function openFullscreenNote(note) {
        const div = document.createElement('div');
        div.className = 'fullscreen-modal';
        div.innerHTML = `<div class="fullscreen-header">
                <input id="fsTitle" value="${escapeHtml(note.title)}" placeholder="Title">
                <button class="fullscreen-close"><i class="fas fa-times"></i></button>
            </div>
            <div id="fsContent" class="fullscreen-content" contenteditable="true">${escapeHtml(note.content)}</div>`;
        document.body.appendChild(div);
        document.body.style.overflow = 'hidden';
        const close = div.querySelector('.fullscreen-close');
        const ti = div.querySelector('#fsTitle');
        const cd = div.querySelector('#fsContent');
        const saveFn = () => { 
            note.title = ti.value.trim() || "Note"; 
            note.content = cd.innerText; 
            saveToLocal(); 
            renderNotes(); 
            div.remove(); 
            document.body.style.overflow = ''; 
            showToast("Saved", true); 
        };
        close.onclick = () => { div.remove(); document.body.style.overflow = ''; };
        cd.addEventListener('keydown', (e) => { if((e.ctrlKey||e.metaKey) && (e.key==='Enter'||e.key==='s')) { e.preventDefault(); saveFn(); } });
        ti.addEventListener('keydown', (e) => { if((e.ctrlKey||e.metaKey) && (e.key==='Enter'||e.key==='s')) { e.preventDefault(); saveFn(); } });
    }

    function openEditModal(note) {
        const modal = document.createElement('div');
        modal.className = 'modal-mask';
        modal.innerHTML = `<div class="modal-card">
                <h3><i class="fas fa-edit"></i> Edit Note</h3>
                <input id="editTitle" value="${escapeHtml(note.title)}" placeholder="Title">
                <textarea id="editContent" rows="4" placeholder="Write your note...">${escapeHtml(note.content)}</textarea>
                <div class="modal-actions">
                    <button id="saveEdit" style="background:#ffd966;"><i class="fas fa-save"></i> Save</button>
                    <button id="cancelEdit" style="background:#e0d6c8;">Cancel</button>
                </div>
            </div>`;
        document.body.appendChild(modal);
        document.getElementById('saveEdit').onclick = () => { note.title = document.getElementById('editTitle').value.trim() || "Note"; note.content = document.getElementById('editContent').value; saveToLocal(); renderNotes(); modal.remove(); showToast("Updated", true); };
        document.getElementById('cancelEdit').onclick = () => modal.remove();
    }

    function fullRender() { renderFolders(); renderNotes(); }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/my-notes-app/sw.js').catch(err => console.log('SW failed:', err));
    }

    loadFromLocal();
    fullRender();
</script>
</body>
</html>
