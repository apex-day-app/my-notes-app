<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Notes App</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--btn-width:20px;--btn-height:20px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;padding:0;min-height:100vh;padding-bottom:80px;overflow-y:auto;touch-action:pan-y;overscroll-behavior:none}
.app{max-width:550px;margin:0 10px;background:transparent}
.folder-scroll{background:#1a1a1a;padding:4px 0;margin-bottom:10px;overflow-x:auto;white-space:nowrap;display:flex;gap:2px;border-radius:0;border-top:1px solid #444;border-bottom:1px solid #444}
.folder-item{display:inline-flex;align-items:center;background:linear-gradient(to bottom,#aaa,#1a1a1a);padding:3px 16px;font-size:.75rem;font-weight:600;color:#fff;cursor:pointer;border-radius:0;box-shadow:0 3px 0 #0a0a0a;transition:all .05s linear}
.folder-item.active{background:linear-gradient(to bottom,#2a2a2a,#1a1a1a);box-shadow:0 1px 0 #0a0a0a;transform:translateY(2px);color:#fff}
.folder-item:active{background:linear-gradient(to bottom,#2a2a2a,#1a1a1a);box-shadow:0 1px 0 #0a0a0a;transform:translateY(2px)}
.note-item{background:#1a1a1a;border-radius:20px;border:1px solid #2a2a2a;padding:0;cursor:pointer;position:relative;transition:all .2s;overflow:hidden}
.note-item:not(.empty-note){max-height:120px;min-height:120px;overflow-y:hidden;display:flex;flex-direction:column}
.note-item.empty-note{background:transparent;border:none;padding:0;margin:0;max-height:none;order:-1}
.note-item.selected{background:#2a2a2a;border:2px solid #555;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.note-item.pinned{border:1px solid #2a2a2a}
.note-title{background:#252525;padding:4px 12px;margin:0;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:5;height:32px;min-height:32px;max-height:32px;flex-shrink:0;border-top:1px solid #444;border-bottom:1px solid #444}
.note-number{display:inline-flex;align-items:center;justify-content:center;background:#1a1a1a;color:#888;font-size:.65rem;font-weight:700;width:26px;height:22px;border-radius:0;margin:0;border:1px solid #2a2a2a}
.note-title-text{flex:1;font-size:.85rem;font-weight:600;color:#ccc;white-space:nowrap;overflow-x:auto;overflow-y:hidden;scrollbar-width:thin}
.note-preview{font-size:.75rem;color:#fff;line-height:1.4;white-space:pre-wrap;margin:12px;padding-left:10px;border-left:2px solid #aaa;height:17px;min-height:17px;max-height:17px;overflow-y:hidden;flex:none}
.note-item.pinned .note-preview{border-left-color:#ffd966}
.note-footer{display:flex;gap:12px;justify-content:flex-end;padding:0 12px 12px 12px;height:32px;min-height:32px;flex-shrink:0;background:#1a1a1a}
textarea,input{touch-action:manipulation;font-size:16px;font-family:inherit}
.empty-card{background:#151515;border:none;border-radius:20px;overflow:hidden;box-shadow:0 4px 8px rgba(0,0,0,.3)}
.empty-card-header-wrapper{display:flex;align-items:center;background:#222;padding:0;margin:0;gap:6px;padding-right:8px}
.empty-card-number{background:#2a2a2a;color:#aaa;font-size:.8rem;font-weight:700;width:auto;min-width:32px;height:32px;display:flex;align-items:center;justify-content:center;padding:0 6px;margin:0}
.empty-card-header{flex:1;background:#222;padding:0 8px;margin:0;color:#ccc;font-size:.85rem;font-weight:600;border:none;height:32px;line-height:32px;display:flex;align-items:center;outline:none;overflow-x:auto;overflow-y:hidden;white-space:nowrap;scrollbar-width:thin}
.empty-card-header:focus{outline:none}
.empty-card-header:empty:before{content:attr(data-placeholder);color:#666;font-weight:400}
.empty-card-header:focus:empty:before{content:attr(data-placeholder);color:#666;font-weight:400}
.empty-card-header:focus:not(:empty):before{content:none}
.empty-card-body{padding:14px;background:#151515}
.input-wrapper{position:relative;width:100%}
.empty-text-input{width:100%;padding:14px 16px;border:1px solid #333;border-radius:12px;font-size:16px;background:#0a0a0a;min-height:120px;resize:vertical;outline:none;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#ddd;font-weight:400;line-height:1.5}
.empty-text-input:focus{border-color:#555;background:#111;box-shadow:0 0 0 2px rgba(100,100,100,.1)}
.empty-text-input::placeholder{color:#555;font-size:14px}
.copy-btn,.paste-btn{background:linear-gradient(to bottom,#3a3a3a,#1a1a1a);border:1px solid #444;border-radius:50%;cursor:pointer;padding:0;font-size:10px;font-weight:700;color:#e0e0e0;min-width:var(--btn-width);width:var(--btn-width);height:var(--btn-height);text-align:center;transition:all .05s linear;box-shadow:0 2px 0 #0a0a0a;margin:0 2px;display:inline-flex;align-items:center;justify-content:center}
.copy-btn:active,.paste-btn:active{transform:translateY(2px);box-shadow:0 0 0 #0a0a0a}
.copy-btn.copied{background:#4a4a4a;color:#fff;border-color:#666;box-shadow:0 2px 0 #2a2a2a}
.save-inside-text{position:absolute;right:12px;bottom:12px;top:auto;background:linear-gradient(to bottom,#4a4a2a,#2a2a1a);border:1px solid #ffd966;border-radius:50%;cursor:pointer;padding:0;font-size:10px;font-weight:700;color:#ffd966;min-width:var(--btn-width);width:var(--btn-width);height:var(--btn-height);box-shadow:0 1px 0 #9a8a4a;transition:all .05s linear;z-index:10;display:inline-flex;align-items:center;justify-content:center}
.save-inside-text:active{transform:translateY(1px);box-shadow:0 0 0 #9a8a4a}
.copy-inside-text{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:linear-gradient(to bottom,#3a3a3a,#1a1a1a);border:1px solid #444;border-radius:50%;cursor:pointer;padding:0;font-size:10px;font-weight:700;color:#e0e0e0;min-width:var(--btn-width);width:var(--btn-width);height:var(--btn-height);box-shadow:0 2px 0 #0a0a0a;transition:all .05s linear;z-index:10;display:inline-flex;align-items:center;justify-content:center}
.copy-inside-text:active{transform:translateY(calc(-50% + 2px));box-shadow:0 0 0 #0a0a0a}
.paste-inside-text{position:absolute;right:12px;top:12px;bottom:auto;background:linear-gradient(to bottom,#3a3a3a,#1a1a1a);border:1px solid #444;border-radius:50%;cursor:pointer;padding:0;font-size:10px;font-weight:700;color:#e0e0e0;min-width:var(--btn-width);width:var(--btn-width);height:var(--btn-height);box-shadow:0 2px 0 #0a0a0a;transition:all .05s linear;z-index:10;display:inline-flex;align-items:center;justify-content:center}
.paste-inside-text:active{transform:translateY(2px);box-shadow:0 0 0 #0a0a0a}
.empty-card-header-wrapper .copy-btn,.empty-card-header-wrapper .paste-btn{min-width:calc(var(--btn-width) - 2px);width:calc(var(--btn-width) - 2px);height:calc(var(--btn-height) - 2px);font-size:9px}
.note-footer .copy-btn{min-width:var(--btn-width);width:var(--btn-width);height:var(--btn-height);background:linear-gradient(to bottom,#3a3a3a,#1a1a1a);border:1px solid #444;border-radius:50%;font-size:10px;font-weight:700;color:#e0e0e0;box-shadow:0 2px 0 #0a0a0a}
.note-title .copy-btn{min-width:calc(var(--btn-width) - 2px);width:calc(var(--btn-width) - 2px);height:calc(var(--btn-height) - 2px);font-size:9px}
.fullscreen-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;z-index:2000;display:flex;flex-direction:column;padding:20px;overflow-y:auto}
.fullscreen-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:16px;border-bottom:1px solid #2a2a2a;margin-bottom:20px}
.fullscreen-header input{font-size:1.3rem;font-weight:600;border:none;background:transparent;width:80%;outline:none;font-family:inherit;color:#ddd}
.fullscreen-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:#888;padding:8px}
.fullscreen-content{flex:1;font-size:1rem;line-height:1.6;outline:none;white-space:pre-wrap;min-height:200px;color:#ccc}
.modal-mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-card{background:#1a1a1a;width:85%;max-width:350px;border-radius:28px;padding:20px;border:1px solid #333}
.modal-card h3{font-size:1.1rem;margin-bottom:12px;color:#ddd}
.modal-card input,.modal-card textarea{width:100%;margin:8px 0;padding:10px 14px;border-radius:20px;border:1px solid #333;font-family:inherit;font-size:.9rem;background:#0a0a0a;color:#ddd}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:12px}
.modal-actions button{padding:8px 20px;border-radius:30px;border:none;cursor:pointer;font-size:.85rem;background:#2a2a2a;color:#fff}
.toast{position:fixed;bottom:auto;top:80px;left:50%;transform:translateX(-50%);background:#2a2a2a;color:#fff;padding:8px 16px;border-radius:40px;font-size:.8rem;z-index:1100;animation:slideUpFade .6s ease forwards;white-space:nowrap}
@keyframes slideUpFade{0%{opacity:1;transform:translateX(-50%) translateY(0)}70%{opacity:1;transform:translateX(-50%) translateY(-10px)}100%{opacity:0;transform:translateX(-50%) translateY(-30px);visibility:hidden}}
.selection-toolbar{position:fixed;top:0;left:0;right:0;background:#2e7d32;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;z-index:100;transform:translateY(-100%);transition:transform .3s ease;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.selection-toolbar.show{transform:translateY(0)}
.selection-count{display:inline-block;color:#fff;font-size:14px;font-weight:700;background:#1b5e20;padding:4px 12px;border-radius:20px}
.selection-buttons{display:flex;gap:10px}
.selection-toolbar button{background:#1b5e20;padding:6px 16px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:600;color:#fff;transition:all .2s}
.selection-toolbar button:active{background:#0d3b10;transform:scale(.96)}
.delete-btn{background:#c62828}
.delete-btn:active{background:#8b1a1a}
.select-all-btn{background:#1565c0}
.select-all-btn:active{background:#0d47a1}
.cancel-btn{background:#455a64}
.cancel-btn:active{background:#2c3e40}
.pin-btn{background:#ffd966;color:#1a1a1a}
.notes-list{display:flex;flex-direction:column;gap:6px}
.folder-dialog-mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;z-index:2000;padding-top:60px}
.folder-dialog{background:#1a1a1a;border:1px solid #333;border-radius:12px;width:260px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.folder-dialog-header{background:#252525;padding:10px 12px;color:#fff;font-size:14px;font-weight:600;border-bottom:1px solid #333;text-align:center}
.folder-dialog-body{padding:12px}
.folder-dialog-body input{width:100%;padding:8px 10px;background:#0a0a0a;border:1px solid #444;border-radius:8px;color:#fff;font-size:14px;outline:none}
.folder-dialog-body input:focus{border-color:#ffd966}
.folder-dialog-footer{display:flex;justify-content:flex-end;gap:8px;padding:10px 12px;border-top:1px solid #333}
.folder-dialog-footer button{padding:5px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px}
.folder-dialog-footer button:first-child{background:#333;color:#ccc}
.folder-dialog-footer button:last-child{background:#ffd966;color:#1a1a1a;font-weight:600}
.folder-dialog-footer button:active{transform:scale(.96)}
.note-item,.note-title,.note-preview,.note-footer,.copy-btn,.paste-btn,.folder-item,.empty-card-header,.note-title,.note-preview,.note-footer .copy-btn{user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
.empty-text-input,.folder-dialog-body input{user-select:none;-webkit-user-select:none;caret-color:#ffd966}
.top-bar{background:#252525;padding:12px 16px;margin:0;border-bottom:2px solid #ffd966}
.app-title{font-size:1.4rem;font-weight:700;color:#ffd966;letter-spacing:-.5px}
</style>
</head>
<body>
<div class="top-bar"><div class="app-title">My Notes</div></div>
<div id="foldersList" class="folder-scroll"></div>
<div class="app"><div class="notes-container"><div id="notesListArea" class="notes-list"></div></div></div>
<div class="selection-toolbar" id="selectionToolbar">
<span class="selection-count" id="selectionCount">0</span>
<div class="selection-buttons">
<button class="select-all-btn" id="selectAllBtn">All</button>
<button class="delete-btn" id="deleteSelectedBtn">Delete</button>
<button class="cancel-btn" id="cancelSelectionBtn">Cancel</button>
</div>
</div>
<script>
let folders=[],notes=[],currentFolderId=null;
function getEmptyNoteId(folderId){return'empty_'+folderId}
function isEmptyNote(note){return note.id&&note.id.toString().startsWith('empty_')}
function ensureEmptyNoteForAllFolders(){folders.forEach(folder=>{const emptyId=getEmptyNoteId(folder.id);if(!notes.find(n=>n.id===emptyId))notes.push({id:emptyId,folderId:folder.id,title:"",content:"",isEmpty:true})});notes=notes.filter(note=>{if(note.id&&note.id.toString().startsWith('empty_')){const folderId=note.id.toString().replace('empty_','');return folders.some(f=>f.id===folderId)}return true})}
function loadFromLocal(){const rawFolders=localStorage.getItem('notes_folders'),rawNotes=localStorage.getItem('notes_notes');folders=rawFolders?JSON.parse(rawFolders):[{id:'f1',name:'Main'}];notes=rawNotes?JSON.parse(rawNotes):[];if(folders.length&&!currentFolderId)currentFolderId=folders[0].id;if(!folders.find(f=>f.id===currentFolderId))currentFolderId=folders[0]?.id;ensureEmptyNoteForAllFolders();saveToLocal()}
function saveToLocal(){localStorage.setItem('notes_folders',JSON.stringify(folders));localStorage.setItem('notes_notes',JSON.stringify(notes))}
function escapeHtml(str){if(!str)return'';return str.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':m==='>'?'&gt;':m)}
function showToast(msg,isSuccess=false){let t=document.querySelector('.toast');if(t)t.remove();let div=document.createElement('div');div.className='toast';div.innerHTML=msg;if(isSuccess)div.style.background="#3a3a3a";document.body.appendChild(div);setTimeout(()=>div.remove(),600)}
async function handleCopy(text,btn){if(text&&text.trim()){await navigator.clipboard.writeText(text);const originalText=btn.innerText;btn.innerText='✓';btn.classList.add('copied');showToast("Copied!",true);setTimeout(()=>{btn.innerText=originalText;btn.classList.remove('copied')},800)}else showToast("Nothing to copy")}
function renderFolders(){const container=document.getElementById('foldersList');container.innerHTML='';folders.forEach(folder=>{const folderSpan=document.createElement('span');folderSpan.className=`folder-item ${currentFolderId===folder.id?'active':''}`;folderSpan.innerText=folder.name;folderSpan.addEventListener('click',()=>{currentFolderId=folder.id;fullRender()});container.appendChild(folderSpan)});const addBtn=document.createElement('span');addBtn.className='folder-item';addBtn.innerText='+';addBtn.style.fontSize='1.3rem';addBtn.style.fontWeight='bold';addBtn.style.cssText='display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(to bottom,#d4942a,#a86a0a);padding:3px 16px;color:#fff;cursor:pointer;border-radius:0;box-shadow:0 3px 0 #6a3a00';addBtn.addEventListener('click',()=>{const modal=document.createElement('div');modal.className='folder-dialog-mask';modal.innerHTML=`<div class="folder-dialog"><div class="folder-dialog-header">New Folder</div><div class="folder-dialog-body"><input type="text" id="folderNameInput" placeholder="Folder name" autocomplete="off"></div><div class="folder-dialog-footer"><button id="folderDialogCancel">Cancel</button><button id="folderDialogCreate">Create</button></div></div>`;document.body.appendChild(modal);const input=modal.querySelector('#folderNameInput');input.focus();modal.querySelector('#folderDialogCancel').onclick=()=>modal.remove();modal.querySelector('#folderDialogCreate').onclick=()=>{let name=input.value.trim();if(name){name=name.toLowerCase().split(' ').map(word=>word.length>0?word.charAt(0).toUpperCase()+word.slice(1):word).join(' ');folders.push({id:'f_'+Date.now(),name});currentFolderId=folders[folders.length-1].id;ensureEmptyNoteForAllFolders();saveToLocal();fullRender();showToast("Folder created",true);modal.remove()}else{input.style.border="1px solid #ff4444";setTimeout(()=>{input.style.border="1px solid #444444"},1000)}};input.addEventListener('keypress',e=>{if(e.key==='Enter')modal.querySelector('#folderDialogCreate').click()})});container.appendChild(addBtn)}
let selectionMode=false,selectedNotes=new Set,selectedOrder=[],longPressTimer=null;
function updateSelectionCount(){document.getElementById('selectionCount').innerText=selectedNotes.size;let allNotes=document.querySelectorAll('.note-item:not(.empty-note)');let selectAllBtn=document.getElementById('selectAllBtn');if(selectAllBtn){if(selectedNotes.size===allNotes.length&&allNotes.length>0)selectAllBtn.innerText='Deselect';else selectAllBtn.innerText='All'}}
function toggleSelectionMode(){selectionMode=!selectionMode;selectedNotes.clear();selectedOrder=[];if(selectionMode){document.getElementById('selectionToolbar').classList.add('show');const toolbar=document.getElementById('selectionToolbar');const buttonsDiv=toolbar.querySelector('.selection-buttons');buttonsDiv.innerHTML=`<button class="select-all-btn" id="selectAllBtn">All</button><button class="pin-btn" id="pinSelectedBtn">Pin</button><button class="delete-btn" id="deleteSelectedBtn">Delete</button><button class="cancel-btn" id="cancelSelectionBtn">Cancel</button>`;document.getElementById('selectAllBtn').onclick=()=>{let allNotes=document.querySelectorAll('.note-item:not(.empty-note)');if(selectedNotes.size===allNotes.length&&allNotes.length>0){selectedNotes.clear();selectedOrder=[];allNotes.forEach(n=>n.classList.remove('selected'))}else{selectedOrder=[];allNotes.forEach(n=>{let id=n.querySelector('.copy-title-note')?.getAttribute('data-id');if(id){selectedNotes.add(id);selectedOrder.push(id);n.classList.add('selected')}})}updateSelectionCount()};document.getElementById('pinSelectedBtn').onclick=()=>{if(selectedNotes.size===0)return showToast("No notes selected");const currentTime=Date.now();for(let i=selectedOrder.length-1;i>=0;i--){const id=selectedOrder[i];const note=notes.find(n=>n.id===id);if(note){if(note.pinned){note.pinned=false;note.unpinTime=currentTime+(selectedOrder.length-i);delete note.pinTime}else{note.pinned=true;note.pinTime=currentTime+(selectedOrder.length-i);delete note.unpinTime}}}saveToLocal();renderNotes();toggleSelectionMode();showToast("Updated",true)};document.getElementById('deleteSelectedBtn').onclick=()=>{if(selectedNotes.size===0)return showToast("No notes selected");if(confirm("Delete "+selectedNotes.size+" note(s)?")){notes=notes.filter(n=>!selectedNotes.has(n.id));saveToLocal();renderNotes();toggleSelectionMode();showToast("Deleted",true)}};document.getElementById('cancelSelectionBtn').onclick=toggleSelectionMode;document.querySelectorAll('.note-item:not(.empty-note)').forEach(item=>{item.style.cursor='pointer'})}else{document.getElementById('selectionToolbar').classList.remove('show');document.querySelectorAll('.note-item').forEach(item=>{item.classList.remove('selected');item.style.cursor=''})}updateSelectionCount()}
function toggleNoteSelection(noteId,element){if(!selectionMode)return;if(selectedNotes.has(noteId)){selectedNotes.delete(noteId);const index=selectedOrder.indexOf(noteId);if(index>-1)selectedOrder.splice(index,1);element.classList.remove('selected')}else{selectedNotes.add(noteId);selectedOrder.push(noteId);element.classList.add('selected')}updateSelectionCount();if(selectedNotes.size===0)toggleSelectionMode()}
function renderNotes(){const container=document.getElementById('notesListArea');let folderNotes=notes.filter(n=>n.folderId===currentFolderId);folderNotes.sort((a,b)=>{if(isEmptyNote(a)&&!isEmptyNote(b))return-1;if(!isEmptyNote(a)&&isEmptyNote(b))return1;if(!isEmptyNote(a)&&!isEmptyNote(b)){if(a.pinned&&!b.pinned)return-1;if(!a.pinned&&b.pinned)return1;if(a.pinned&&b.pinned){const pinTimeA=a.pinTime||0,pinTimeB=b.pinTime||0;if(pinTimeA!==pinTimeB)return pinTimeB-pinTimeA}const unpinTimeA=a.unpinTime||0,unpinTimeB=b.unpinTime||0;if(unpinTimeA!==unpinTimeB)return unpinTimeB-unpinTimeA;const timeA=parseInt(a.id.split('_')[0])||0,timeB=parseInt(b.id.split('_')[0])||0;return timeB-timeA}return 0});let validNotes=folderNotes.filter(n=>!isEmptyNote(n));for(let i=0;i<validNotes.length;i++)validNotes[i].displayNumber=validNotes.length-i;container.innerHTML='';folderNotes.forEach(note=>{const isEmpty=isEmptyNote(note);const card=document.createElement('div');card.className=`note-item ${isEmpty?'empty-note':''} ${note.pinned?'pinned':''}`;if(isEmpty){const uid=note.id,nextNumber=validNotes.length+1;card.innerHTML=`<div class="empty-card"><div class="empty-card-header-wrapper"><div class="empty-card-number" id="emptyNumber_${uid}">${nextNumber}</div><div class="empty-card-header" contenteditable="true" id="editableTitle_${uid}" data-placeholder="Title"></div><button class="copy-title-inside copy-btn" data-id="${uid}">C</button><button class="paste-title-inside paste-btn" data-id="${uid}">P</button></div><div class="empty-card-body"><div class="input-wrapper"><textarea id="text_${uid}" placeholder="Write note..." class="empty-text-input"></textarea><button class="copy-text-inside copy-inside-text" data-id="${uid}">C</button><button class="paste-text-inside paste-inside-text" data-id="${uid}">P</button><button class="save-empty-btn save-inside-text" data-id="${uid}">S</button></div></div></div>`;setTimeout(()=>{const ta=document.getElementById(`text_${uid}`);if(ta){ta.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();document.querySelector(`.save-empty-btn[data-id="${uid}"]`).click()}});ta.addEventListener('paste',e=>{e.preventDefault();const text=(e.clipboardData||window.clipboardData).getData('text/plain');const start=ta.selectionStart,end=ta.selectionEnd,value=ta.value;ta.value=value.substring(0,start)+text+value.substring(end);ta.selectionStart=ta.selectionEnd=start+text.length})}const titleDiv=document.getElementById(`editableTitle_${uid}`);if(titleDiv){titleDiv.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();titleDiv.blur()}});titleDiv.addEventListener('paste',e=>{e.preventDefault();const text=(e.clipboardData||window.clipboardData).getData('text/plain');const singleLineText=text.replace(/\n/g,' ').replace(/\r/g,' ').replace(/\s+/g,' ').trim();document.execCommand('insertText',false,singleLineText)});titleDiv.addEventListener('blur',function(){if(this.innerText.trim()==='')this.innerText='';this.innerText=this.innerText.replace(/\n/g,' ').replace(/\r/g,' ')})}},10)}else{let preview="";if(note.content){preview=note.content.substring(0,65);if(preview.length>62)preview=preview.slice(0,60)+"..."}card.innerHTML=`<div class="note-title"><span class="note-number">${note.displayNumber}</span><div class="note-title-text">${escapeHtml(note.title)}</div><button class="copy-title-note copy-btn" data-id="${note.id}">C</button></div><div class="note-preview">${escapeHtml(preview)}</div><div class="note-footer"><button class="copy-content-note copy-btn" data-id="${note.id}">C</button></div>`;card.addEventListener('touchstart',e=>{if(!selectionMode&&!isEmpty){longPressTimer=setTimeout(()=>{toggleSelectionMode();const noteId=note.id;selectedNotes.add(noteId);selectedOrder.push(noteId);card.classList.add('selected');updateSelectionCount()},500)}});card.addEventListener('touchend',()=>{clearTimeout(longPressTimer)});card.addEventListener('touchmove',()=>{clearTimeout(longPressTimer)});card.addEventListener('click',e=>{if(e.target.closest('.note-title-text')||e.target.closest('.copy-title-note')||e.target.closest('.copy-content-note'))return;if(selectionMode){e.stopPropagation();toggleNoteSelection(note.id,card)}else openFullscreenNote(note)})}container.appendChild(card)});document.querySelectorAll('.save-empty-btn').forEach(btn=>{btn.onclick=()=>{const id=btn.getAttribute('data-id');const found=notes.find(n=>n.id===id);if(found&&isEmptyNote(found)){const titleVal=document.getElementById(`editableTitle_${id}`).innerText.trim();const contentVal=document.getElementById(`text_${id}`).value.trim();if(contentVal){const finalTitle=titleVal||contentVal.split(/\r?\n/)[0].substring(0,40)||"Note";notes.push({id:Date.now()+'_'+Math.random(),folderId:currentFolderId,title:finalTitle,content:contentVal});saveToLocal();document.getElementById(`editableTitle_${id}`).innerText='';document.getElementById(`text_${id}`).value='';renderNotes()}else showToast("Write something")}}});document.querySelectorAll('.copy-title-inside').forEach(btn=>{btn.onclick=async()=>{const id=btn.getAttribute('data-id');const titleDiv=document.getElementById(`editableTitle_${id}`);handleCopy(titleDiv?.innerText,btn)}});document.querySelectorAll('.paste-title-inside').forEach(btn=>{btn.onclick=async()=>{const id=btn.getAttribute('data-id');const titleDiv=document.getElementById(`editableTitle_${id}`);if(titleDiv){try{const text=await navigator.clipboard.readText();if(text&&text.trim()){titleDiv.innerText=text;showToast("Pasted",true)}else showToast("Empty")}catch(e){showToast("Allow permission")}}}});document.querySelectorAll('.copy-text-inside').forEach(btn=>{btn.onclick=async()=>{const id=btn.getAttribute('data-id');const textarea=document.getElementById(`text_${id}`);handleCopy(textarea?.value,btn)}});document.querySelectorAll('.paste-text-inside').forEach(btn=>{btn.onclick=async()=>{const id=btn.getAttribute('data-id');const textarea=document.getElementById(`text_${id}`);if(textarea){try{const text=await navigator.clipboard.readText();if(text&&text.trim()){textarea.value=text;showToast("Pasted",true)}else showToast("Empty")}catch(e){showToast("Allow permission")}}}});document.querySelectorAll('.copy-title-note').forEach(btn=>{btn.onclick=async e=>{e.stopPropagation();const n=notes.find(x=>x.id===btn.getAttribute('data-id'));handleCopy(n?.title,btn)}});document.querySelectorAll('.copy-content-note').forEach(btn=>{btn.onclick=async e=>{e.stopPropagation();const n=notes.find(x=>x.id===btn.getAttribute('data-id'));handleCopy(n?.content,btn)}})}
document.getElementById('selectAllBtn').onclick=()=>{let allNotes=document.querySelectorAll('.note-item:not(.empty-note)');if(selectedNotes.size===allNotes.length&&allNotes.length>0){selectedNotes.clear();selectedOrder=[];allNotes.forEach(n=>n.classList.remove('selected'))}else{selectedOrder=[];allNotes.forEach(n=>{let id=n.querySelector('.copy-title-note')?.getAttribute('data-id');if(id){selectedNotes.add(id);selectedOrder.push(id);n.classList.add('selected')}})}updateSelectionCount()};
document.getElementById('deleteSelectedBtn').onclick=()=>{if(selectedNotes.size===0)return showToast("No notes selected");if(confirm("Delete "+selectedNotes.size+" note(s)?")){notes=notes.filter(n=>!selectedNotes.has(n.id));saveToLocal();renderNotes();toggleSelectionMode();showToast("Deleted",true)}};
document.getElementById('cancelSelectionBtn').onclick=toggleSelectionMode;
function openFullscreenNote(note){window.currentFullscreenNote=note;const div=document.createElement('div');div.className='fullscreen-modal';div.innerHTML=`<div class="fullscreen-header"><input id="fsTitle" value="${escapeHtml(note.title)}" placeholder="Title"><button class="fullscreen-close">X</button></div><div id="fsContent" class="fullscreen-content" contenteditable="true">${escapeHtml(note.content)}</div>`;document.body.appendChild(div);document.body.style.overflow='hidden';const close=div.querySelector('.fullscreen-close');const ti=div.querySelector('#fsTitle');const cd=div.querySelector('#fsContent');const saveFn=()=>{note.title=ti.value.trim()||"Note";note.content=cd.innerText;saveToLocal();renderNotes();div.remove();document.body.style.overflow='';window.currentFullscreenNote=null};close.onclick=()=>{window.currentFullscreenNote=null;div.remove();document.body.style.overflow=''};cd.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&(e.key==='Enter'||e.key==='s')){e.preventDefault();saveFn()}});ti.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&(e.key==='Enter'||e.key==='s')){e.preventDefault();saveFn()}})}
function openEditModal(note){const modal=document.createElement('div');modal.className='modal-mask';modal.innerHTML=`<div class="modal-card"><h3>Edit Note</h3><input id="editTitle" value="${escapeHtml(note.title)}" placeholder="Title"><textarea id="editContent" rows="4" placeholder="Write your note...">${escapeHtml(note.content)}</textarea><div class="modal-actions"><button id="saveEdit" style="background:#2a2a2a;color:#fff">Save</button><button id="cancelEdit" style="background:#333">Cancel</button></div></div>`;document.body.appendChild(modal);document.getElementById('saveEdit').onclick=()=>{note.title=document.getElementById('editTitle').value.trim()||"Note";note.content=document.getElementById('editContent').value;saveToLocal();renderNotes();modal.remove();showToast("Updated",true)};document.getElementById('cancelEdit').onclick=()=>modal.remove()}
function fullRender(){renderFolders();renderNotes()}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();const activeElement=document.activeElement;if(activeElement&&activeElement.id==='folderNameInput'){const createBtn=document.querySelector('#folderDialogCreate');if(createBtn)createBtn.click()}else if(activeElement&&activeElement.id&&activeElement.id.startsWith('text_')){const id=activeElement.id.replace('text_','');const btn=document.querySelector(`.save-empty-btn[data-id="${id}"]`);if(btn)btn.click()}else if(activeElement&&activeElement.id&&activeElement.id.startsWith('editableTitle_')){const id=activeElement.id.replace('editableTitle_','');const btn=document.querySelector(`.save-empty-btn[data-id="${id}"]`);if(btn)btn.click()}else if((activeElement&&activeElement.id==='fsTitle')||(activeElement&&activeElement.id==='fsContent')){const note=window.currentFullscreenNote;if(note){const ti=document.getElementById('fsTitle');const cd=document.getElementById('fsContent');note.title=ti.value.trim()||"Note";note.content=cd.innerText;saveToLocal();renderNotes()}}}})
if('serviceWorker' in navigator){navigator.serviceWorker.register('/my-notes-app/sw.js').catch(err=>console.log('SW failed:',err))}
loadFromLocal();fullRender();
</script>
