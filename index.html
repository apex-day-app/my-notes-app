<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नोट्स ऐप</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>
                <!-- Note Icon -->
                <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                </svg>
                नोट्स
            </h1>
            <button id="addNoteBtn">
                <!-- Plus Icon -->
                <svg class="icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                </svg>
                नया
            </button>
        </header>

        <div id="notesContainer"></div>

        <!-- Modal -->
        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <h2>
                    <!-- Edit Icon -->
                    <svg class="icon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                        <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                    </svg>
                    नया नोट
                </h2>
                <input type="text" id="noteTitle" placeholder="शीर्षक...">
                <textarea id="noteContent" placeholder="नोट लिखें..."></textarea>
                <div class="modal-actions">
                    <button id="saveNoteBtn" class="save-btn">
                        <!-- Save Icon -->
                        <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/>
                        </svg>
                        सेव करें
                    </button>
                    <button id="closeModalBtn" class="close-btn">
                        <!-- Close Icon -->
                        <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                        </svg>
                        रद्द करें
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Service Worker Register
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/my-notes-app/sw.js')
                .then(() => console.log('✅ Service Worker registered'))
                .catch(err => console.log('❌ Service Worker failed:', err));
        }

        // Offline Check
        window.addEventListener('load', () => {
            if (!navigator.onLine) {
                const offlineMsg = document.createElement('div');
                offlineMsg.id = 'offlineBanner';
                offlineMsg.textContent = '📡 आप ऑफलाइन हैं - सेव्ड डेटा के साथ काम कर रहे हैं';
                document.body.prepend(offlineMsg);
            }
        });
    </script>
</body>
</html>
