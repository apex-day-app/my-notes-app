<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notes App</title>
    <link rel="manifest" href="manifest.json">
    <style>
:root {
    --btn-width: 20px;
    --btn-height: 20px;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}
body {
    background: #000000;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    padding: 0px;
    min-height: 100vh;
    padding-bottom: 80px;
    overflow-y: auto;
    touch-action: pan-y;
}
.app {
    max-width: 550px;
    margin: 0 10px;
    background: transparent;
}
.folder-scroll {
    background: #1a1a1a;
    padding: 4px 0px;
    margin-bottom: 10px;
    overflow-x: auto;
    white-space: nowrap;
    display: flex;
    gap: 2px;
    border-radius: 0px;
}
.folder-item {
    display: inline-flex;
    align-items: center;
    background: linear-gradient(to bottom, #2a2a2a, #1a1a1a);
    padding: 3px 16px;
    font-size: 0.75rem;
    font-weight: 600;
    color: #c0c0c0;
    cursor: pointer;
    border-radius: 0px;
    box-shadow: 0 3px 0 #0a0a0a;
    transition: all 0.05s linear;
}
.folder-item.active {
    background: linear-gradient(to bottom, #2a2a2a, #1a1a1a);
    box-shadow: 0 1px 0 #0a0a0a;
    transform: translateY(2px);
    color: #ffffff;
}
.folder-item:active {
    background: linear-gradient(to bottom, #2a2a2a, #1a1a1a);
    box-shadow: 0 1px 0 #0a0a0a;
    transform: translateY(2px);
}
.note-item {
    background: #1a1a1a;
    border-radius: 20px;
    border: 1px solid #2a2a2a;
    padding: 0px;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
    overflow: hidden;
}
/* Saved Notes - Fixed Height */
.note-item:not(.empty-note) {
    max-height: 120px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}
/* Empty Note Card - Normal Height */
.note-item.empty-note {
    background: transparent;
    border: none;
    padding: 0px;
    margin: 0px;
    max-height: none;
}
.note-item.selected {
    background: #2a2a2a;
    border: 2px solid #555555;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
}
.note-title {
    background: #252525;
    padding: 4px 12px;
    margin: 0px;
    display: flex;
    align-items: center;
    gap: 8px;
    position: sticky;
    top: 0;
    z-index: 5;
}
.note-number {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #1a1a1a;
    color: #888888;
    font-size: 0.65rem;
    font-weight: 700;
    width: 26px;
    height: 22px;
    border-radius: 0px;
    margin: 0px;
    border: 1px solid #2a2a2a;
}
.note-title-text {
    flex: 1;
    font-size: 0.85rem;
    font-weight: 600;
    color: #cccccc;
}
.note-preview {
    font-size: 0.75rem;
    color: #888888;
    line-height: 1.4;
    white-space: pre-wrap;
    margin: 12px;
    padding-left: 10px;
    border-left: 2px solid #333333;
    min-height: 40px;
    max-height: 60px;
    overflow-y: auto;
    flex: 1;
}
.note-footer {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    padding: 0px 12px 12px 12px;
}
textarea, input {
    touch-action: manipulation;
    font-size: 16px;
    font-family: inherit;
}
.empty-card {
    background: #151515;
    border: none;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
}
.empty-card-header-wrapper {
    display: flex;
    align-items: center;
    background: #222222;
    padding: 0px;
    margin: 0px;
    gap: 6px;
    padding-right: 8px;
}
.empty-card-number {
    background: #2a2a2a;
    color: #aaaaaa;
    font-size: 0.8rem;
    font-weight: 700;
    width: auto;
    min-width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 6px;
    margin: 0px;
}
.empty-card-header {
    flex: 1;
    background: #222222;
    padding: 0px 8px;
    margin: 0px;
    color: #cccccc;
    font-size: 0.85rem;
    font-weight: 600;
    border: none;
    height: 32px;
    line-height: 32px;
    display: flex;
    align-items: center;
    outline: none;
}
.empty-card-header:focus {
    outline: none;
}
.empty-card-header:empty:before {
    content: attr(data-placeholder);
    color: #666666;
    font-weight: normal;
}
.empty-card-header:focus:empty:before {
    content: attr(data-placeholder);
    color: #666666;
    font-weight: normal;
}
.empty-card-header:focus:not(:empty):before {
    content: none;
}
.empty-card-body {
    padding: 14px;
    background: #151515;
}
.input-wrapper {
    position: relative;
    width: 100%;
}
.empty-text-input {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid #333333;
    border-radius: 12px;
    font-size: 16px;
    background: #0a0a0a;
    min-height: 120px;
    resize: vertical;
    outline: none;
    font-family: inherit;
    color: #dddddd;
}
.empty-text-input:focus {
    border-color: #555555;
    background: #111111;
    box-shadow: 0 0 0 2px rgba(100, 100, 100, 0.1);
}
.empty-text-input::placeholder {
    color: #555555;
    font-size: 14px;
}
.copy-btn, .paste-btn {
    background: linear-gradient(to bottom, #3a3a3a, #1a1a1a);
    border: 1px solid #444444;
    border-radius: 50%;
    cursor: pointer;
    padding: 0px;
    font-size: 10px;
    font-weight: bold;
    color: #e0e0e0;
    min-width: var(--btn-width);
    width: var(--btn-width);
    height: var(--btn-height);
    text-align: center;
    transition: all 0.05s linear;
    box-shadow: 0 2px 0 #0a0a0a;
    margin: 0 2px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}
.copy-btn:active, .paste-btn:active {
    transform: translateY(2px);
    box-shadow: 0 0px 0 #0a0a0a;
}
.copy-btn.copied {
    background: #4a4a4a;
    color: white;
    border-color: #666666;
    box-shadow: 0 2px 0 #2a2a2a;
}
.save-inside-text {
    position: absolute;
    right: 12px;
    bottom: 12px;
    top: auto;
    background: linear-gradient(to bottom, #4a4a2a, #2a2a1a);
    border: 1px solid #ffd966;
    border-radius: 50%;
    cursor: pointer;
    padding: 0px;
    font-size: 10px;
    font-weight: bold;
    color: #ffd966;
    min-width: var(--btn-width);
    width: var(--btn-width);
    height: var(--btn-height);
    box-shadow: 0 1px 0 #9a8a4a;
    transition: all 0.05s linear;
    z-index: 10;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}
.save-inside-text:active {
    transform: translateY(1px);
    box-shadow: 0 0px 0 #9a8a4a;
}
.copy-inside-text {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: linear-gradient(to bottom, #3a3a3a, #1a1a1a);
    border: 1px solid #444444;
    border-radius: 50%;
    cursor: pointer;
    padding: 0px;
    font-size: 10px;
    font-weight: bold;
    color: #e0e0e0;
    min-width: var(--btn-width);
    width: var(--btn-width);
    height: var(--btn-height);
    box-shadow: 0 2px 0 #0a0a0a;
    transition: all 0.05s linear;
    z-index: 10;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}
.copy-inside-text:active {
    transform: translateY(calc(-50% + 2px));
    box-shadow: 0 0px 0 #0a0a0a;
}
.paste-inside-text {
    position: absolute;
    right: 12px;
    top: 12px;
    bottom: auto;
    background: linear-gradient(to bottom, #3a3a3a, #1a1a1a);
    border: 1px solid #444444;
    border-radius: 50%;
    cursor: pointer;
    padding: 0px;
    font-size: 10px;
    font-weight: bold;
    color: #e0e0e0;
    min-width: var(--btn-width);
    width: var(--btn-width);
    height: var(--btn-height);
    box-shadow: 0 2px 0 #0a0a0a;
    transition: all 0.05s linear;
    z-index: 10;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}
.paste-inside-text:active {
    transform: translateY(2px);
    box-shadow: 0 0px 0 #0a0a0a;
}
.empty-card-header-wrapper .copy-btn, 
.empty-card-header-wrapper .paste-btn {
    min-width: calc(var(--btn-width) - 2px);
    width: calc(var(--btn-width) - 2px);
    height: calc(var(--btn-height) - 2px);
    font-size: 9px;
}
.note-footer .copy-btn {
    min-width: var(--btn-width);
    width: var(--btn-width);
    height: var(--btn-height);
    background: linear-gradient(to bottom, #3a3a3a, #1a1a1a);
    border: 1px solid #444444;
    border-radius: 50%;
    font-size: 10px;
    font-weight: bold;
    color: #e0e0e0;
    box-shadow: 0 2px 0 #0a0a0a;
    position: absolute;
    bottom: 8px;
    right: 12px;
    z-index: 10;
}
.note-title .copy-btn {
    min-width: calc(var(--btn-width) - 2px);
    width: calc(var(--btn-width) - 2px);
    height: calc(var(--btn-height) - 2px);
    font-size: 9px;
}
.fullscreen-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0a0a0a;
    z-index: 2000;
    display: flex;
    flex-direction: column;
    padding: 20px;
    overflow-y: auto;
}
.fullscreen-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 16px;
    border-bottom: 1px solid #2a2a2a;
    margin-bottom: 20px;
}
.fullscreen-header input {
    font-size: 1.3rem;
    font-weight: 600;
    border: none;
    background: transparent;
    width: 80%;
    outline: none;
    font-family: inherit;
    color: #dddddd;
}
.fullscreen-close {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: #888888;
    padding: 8px;
}
.fullscreen-content {
    flex: 1;
    font-size: 1rem;
    line-height: 1.6;
    outline: none;
    white-space: pre-wrap;
    min-height: 200px;
    color: #cccccc;
}
.modal-mask {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}
.modal-card {
    background: #1a1a1a;
    width: 85%;
    max-width: 350px;
    border-radius: 28px;
    padding: 20px;
    border: 1px solid #333333;
}
.modal-card h3 {
    font-size: 1.1rem;
    margin-bottom: 12px;
    color: #dddddd;
}
.modal-card input, .modal-card textarea {
    width: 100%;
    margin: 8px 0;
    padding: 10px 14px;
    border-radius: 20px;
    border: 1px solid #333333;
    font-family: inherit;
    font-size: 0.9rem;
    background: #0a0a0a;
    color: #dddddd;
}
.modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 12px;
}
.modal-actions button {
    padding: 8px 20px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-size: 0.85rem;
    background: #2a2a2a;
    color: white;
}
.toast {
    position: fixed;
    bottom: auto;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: #2a2a2a;
    color: white;
    padding: 8px 16px;
    border-radius: 40px;
    font-size: 0.8rem;
    z-index: 1100;
    animation: slideUpFade 0.6s ease forwards;
    white-space: nowrap;
}
@keyframes slideUpFade {
    0% { opacity: 1; transform: translateX(-50%) translateY(0); }
    70% { opacity: 1; transform: translateX(-50%) translateY(-10px); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-30px); visibility: hidden; }
}
.selection-toolbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: #1a1a1a;
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    transform: translateY(-100%);
    transition: transform 0.3s ease;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
}
.selection-toolbar.show {
    transform: translateY(0);
}
.selection-count {
    display: inline-block;
    color: #ffffff;
    font-size: 14px;
    font-weight: bold;
    background: #2a2a2a;
    padding: 4px 12px;
    border-radius: 20px;
}
.selection-buttons {
    display: flex;
    gap: 10px;
}
.selection-toolbar button {
    background: #2a2a2a;
    padding: 6px 16px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: #ffffff;
    transition: all 0.2s;
}
.selection-toolbar button:active {
    background: #111111;
    transform: scale(0.96);
}
.delete-btn { background: #441111; }
.delete-btn:active { background: #220000; }
.select-all-btn { background: #113344; }
.select-all-btn:active { background: #001122; }
.cancel-btn { background: #333333; }
.cancel-btn:active { background: #222222; }
.notes-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
}
/* Folder Dialog Box */
.folder-dialog-mask {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
}
.folder-dialog {
    background: #1a1a1a;
    border: 1px solid #333333;
    border-radius: 12px;
    width: 280px;
    overflow: hidden;
}
.folder-dialog-header {
    background: #252525;
    padding: 12px 16px;
    color: #ffffff;
    font-size: 16px;
    font-weight: 600;
    border-bottom: 1px solid #333333;
}
.folder-dialog-body {
    padding: 16px;
}
.folder-dialog-body input {
    width: 100%;
    padding: 10px 12px;
    background: #0a0a0a;
    border: 1px solid #444444;
    border-radius: 8px;
    color: #ffffff;
    font-size: 14px;
    outline: none;
}
.folder-dialog-body input:focus {
    border-color: #666666;
}
.folder-dialog-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding: 12px 16px;
    border-top: 1px solid #333333;
}
.folder-dialog-footer button {
    padding: 6px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 13px;
}
.folder-dialog-footer button:first-child {
    background: #333333;
    color: #cccccc;
}
.folder-dialog-footer button:last-child {
    background: #2a2a2a;
    color: #ffffff;
    border: 1px solid #555555;
}
.folder-dialog-footer button:active {
    transform: scale(0.96);
}

.note-item, .note-title, .note-preview, .note-footer, .copy-btn, .paste-btn {
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
}

/* Folder Names - Text select band */
.folder-item {
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
}

/* Empty Card Header (Title) - Text select band */
.empty-card-header {
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
}

/* Textarea - Cursor dikhega, lekin long press select nahi hoga */
.empty-text-input {
    user-select: none;
    -webkit-user-select: none;
    caret-color: #ffd966;  /* Cursor visible */
}

/* Folder dialog input - Cursor dikhega */
.folder-dialog-body input {
    user-select: none;
    -webkit-user-select: none;
    caret-color: #ffd966;
}

/* Note Title - Text select band */
.note-title {
    user-select: none;
    -webkit-user-select: none;
}

/* Note Preview - Text select band */
.note-preview {
    user-select: none;
    -webkit-user-select: none;
}

/* Note Footer Buttons - Text select nahi hoga */
.note-footer .copy-btn {
    user-select: none;
    -webkit-user-select: none;
}



</style>
</head>
<body>
<div id="foldersList" class="folder-scroll"></div>
<div class="app">
    <div class="notes-container">
        <div id="notesListArea" class="notes-list"></div>
    </div>
</div>
<div class="selection-toolbar" id="selectionToolbar">
    <span class="selection-count" id="selectionCount">0</span>
    <div class="selection-buttons">
        <button class="select-all-btn" id="selectAllBtn">All</button>
        <button class="delete-btn" id="deleteSelectedBtn">Delete</button>
        <button class="cancel-btn" id="cancelSelectionBtn">Cancel</button>
    </div>
</div>
<script>
    let folders = [];
    let notes = [];
    let currentFolderId = null;
    function getEmptyNoteId(folderId) { return 'empty_' + folderId; }
    function isEmptyNote(note) { return note.id && note.id.toString().startsWith('empty_'); }
    function ensureEmptyNoteForAllFolders() {
        folders.forEach(folder => {
            const emptyId = getEmptyNoteId(folder.id);
            const existingEmpty = notes.find(n => n.id === emptyId);
            if (!existingEmpty) {
                notes.push({ id: emptyId, folderId: folder.id, title: "", content: "", isEmpty: true });
            }
        });
        notes = notes.filter(note => {
            if (note.id && note.id.toString().startsWith('empty_')) {
                const folderId = note.id.toString().replace('empty_', '');
                return folders.some(f => f.id === folderId);
            }
            return true;
        });
    }
    function loadFromLocal() {
        const rawFolders = localStorage.getItem('notes_folders');
        const rawNotes = localStorage.getItem('notes_notes');
        if(rawFolders) folders = JSON.parse(rawFolders);
        else folders = [{ id: 'f1', name: 'Main' }];
        if(rawNotes) notes = JSON.parse(rawNotes);
        else notes = [];
        if(folders.length && !currentFolderId) currentFolderId = folders[0].id;
        if(!folders.find(f => f.id === currentFolderId)) currentFolderId = folders[0]?.id;
        ensureEmptyNoteForAllFolders();
        saveToLocal();
    }
    function saveToLocal() {
        localStorage.setItem('notes_folders', JSON.stringify(folders));
        localStorage.setItem('notes_notes', JSON.stringify(notes));
    }
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;';
            return m;
        });
    }
    function showToast(msg, isSuccess = false) {
        let t = document.querySelector('.toast');
        if(t) t.remove();
        let div = document.createElement('div');
        div.className = 'toast';
        div.innerHTML = msg;
        if(isSuccess) div.style.background = "#3a3a3a";
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 600);
    }
    async function handleCopy(text, btn) {
        if (text && text.trim()) {
            await navigator.clipboard.writeText(text);
            const originalText = btn.innerText;
            btn.innerText = '✓';
            btn.classList.add('copied');
            showToast("Copied!", true);
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('copied');
            }, 800);
        } else {
            showToast("Nothing to copy");
        }
    }
    function renderFolders() {
        const container = document.getElementById('foldersList');
        container.innerHTML = '';
        folders.forEach(folder => {
            const folderSpan = document.createElement('span');
            folderSpan.className = `folder-item ${currentFolderId === folder.id ? 'active' : ''}`;
            folderSpan.innerText = folder.name;
            folderSpan.addEventListener('click', () => {
                currentFolderId = folder.id;
                fullRender();
            });
            container.appendChild(folderSpan);
        });
        const addBtn = document.createElement('span');
        addBtn.className = 'folder-item';
        addBtn.innerText = '+';
        addBtn.style.cssText = 'display: inline-flex; align-items: center; justify-content: center; background: linear-gradient(to bottom, #2a2a2a, #1a1a1a); padding: 3px 16px; font-size: 0.75rem; font-weight: 600; color: #ffffff; cursor: pointer; border-radius: 0px; box-shadow: 0 3px 0 #0a0a0a;';
        // Custom Folder Dialog
        addBtn.addEventListener('click', () => {
            const modal = document.createElement('div');
            modal.className = 'folder-dialog-mask';
            modal.innerHTML = `
                <div class="folder-dialog">
                    <div class="folder-dialog-header">New Folder</div>
                    <div class="folder-dialog-body">
                        <input type="text" id="folderNameInput" placeholder="Folder name" autocomplete="off">
                    </div>
                    <div class="folder-dialog-footer">
                        <button id="folderDialogCancel">Cancel</button>
                        <button id="folderDialogCreate">Create</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            const input = modal.querySelector('#folderNameInput');
            input.focus();
            modal.querySelector('#folderDialogCancel').onclick = () => modal.remove();
            modal.querySelector('#folderDialogCreate').onclick = () => {
                const name = input.value.trim();
                if(name) {
                    folders.push({ id: 'f_' + Date.now(), name: name });
                    currentFolderId = folders[folders.length-1].id;
                    ensureEmptyNoteForAllFolders();
                    saveToLocal();
                    fullRender();
                    showToast("Folder created", true);
                    modal.remove();
                } else {
                    input.style.border = "1px solid #ff4444";
                    setTimeout(() => { input.style.border = "1px solid #444444"; }, 1000);
                }
            };
            input.addEventListener('keypress', (e) => {
                if(e.key === 'Enter') {
                    modal.querySelector('#folderDialogCreate').click();
                }
            });
        });
        container.appendChild(addBtn);
    }
    let selectionMode = false;
    let selectedNotes = new Set();
    let longPressTimer = null;
    function updateSelectionCount() {
        document.getElementById('selectionCount').innerText = selectedNotes.size;
        let allNotes = document.querySelectorAll('.note-item:not(.empty-note)');
        let selectAllBtn = document.getElementById('selectAllBtn');
        if (selectAllBtn) {
            if (selectedNotes.size === allNotes.length && allNotes.length > 0) selectAllBtn.innerText = 'Deselect';
            else selectAllBtn.innerText = 'All';
        }
    }
    function toggleSelectionMode() {
        selectionMode = !selectionMode;
        selectedNotes.clear();
        if(selectionMode) {
            document.getElementById('selectionToolbar').classList.add('show');
            document.querySelectorAll('.note-item:not(.empty-note)').forEach(item => {
                item.style.cursor = 'pointer';
            });
        } else {
            document.getElementById('selectionToolbar').classList.remove('show');
            document.querySelectorAll('.note-item').forEach(item => {
                item.classList.remove('selected');
                item.style.cursor = '';
            });
        }
        updateSelectionCount();
    }
    function toggleNoteSelection(noteId, element) {
        if(!selectionMode) return;
        if(selectedNotes.has(noteId)) {
            selectedNotes.delete(noteId);
            element.classList.remove('selected');
        } else {
            selectedNotes.add(noteId);
            element.classList.add('selected');
        }
        updateSelectionCount();
    }
    function renderNotes() {
        const container = document.getElementById('notesListArea');
        let folderNotes = notes.filter(n => n.folderId === currentFolderId);
        folderNotes.sort((a, b) => {
            if (isEmptyNote(a) && !isEmptyNote(b)) return -1;
            if (!isEmptyNote(a) && isEmptyNote(b)) return 1;
            if (!isEmptyNote(a) && !isEmptyNote(b)) {
                const timeA = parseInt(a.id.split('_')[0]) || 0;
                const timeB = parseInt(b.id.split('_')[0]) || 0;
                return timeB - timeA;
            }
            return 0;
        });
        let validNotes = folderNotes.filter(n => !isEmptyNote(n));
        for(let i = 0; i < validNotes.length; i++) {
            validNotes[i].displayNumber = validNotes.length - i;
        }
        container.innerHTML = '';
        folderNotes.forEach(note => {
            const isEmpty = isEmptyNote(note);
            const card = document.createElement('div');
            card.className = `note-item ${isEmpty ? 'empty-note' : ''}`;
            if (isEmpty) {
                const uid = note.id;
                const nextNumber = validNotes.length + 1;
                card.innerHTML = `
                    <div class="empty-card">
                        <div class="empty-card-header-wrapper">
                            <div class="empty-card-number" id="emptyNumber_${uid}">${nextNumber}</div>
                            <div class="empty-card-header" contenteditable="true" id="editableTitle_${uid}" data-placeholder="Title"></div>
                            <button class="copy-title-inside copy-btn" data-id="${uid}">C</button>
                            <button class="paste-title-inside paste-btn" data-id="${uid}">P</button>
                        </div>
                        <div class="empty-card-body">
                            <div class="input-wrapper">
                                <textarea id="text_${uid}" placeholder="Write note..." class="empty-text-input"></textarea>
                                <button class="copy-text-inside copy-inside-text" data-id="${uid}">C</button>
                                <button class="paste-text-inside paste-inside-text" data-id="${uid}">P</button>
                                <button class="save-empty-btn save-inside-text" data-id="${uid}">S</button>
                            </div>
                        </div>
                    </div>`;
                setTimeout(() => {
                    const ta = document.getElementById(`text_${uid}`);
                    if (ta) {
                        ta.addEventListener('keydown', (e) => {
                            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                                e.preventDefault();
                                document.querySelector(`.save-empty-btn[data-id="${uid}"]`).click();
                            }
                        });
                    }
                    const titleDiv = document.getElementById(`editableTitle_${uid}`);
                    if (titleDiv) {
                        titleDiv.addEventListener('blur', function() {
                            if (this.innerText.trim() === '') {
                                this.innerText = '';
                            }
                        });
                    }
                }, 10);
            } else {
                let preview = "";
                if(note.content) {
                    preview = note.content.substring(0, 65);
                    if(preview.length > 62) preview = preview.slice(0, 60) + "...";
                }
                card.innerHTML = `
                    <div class="note-title">
                        <span class="note-number">${note.displayNumber}</span>
                        <span class="note-title-text">${escapeHtml(note.title)}</span>
                        <button class="copy-title-note copy-btn" data-id="${note.id}">C</button>
                    </div>
                    <div class="note-preview">${escapeHtml(preview)}</div>
                    <div class="note-footer">
                        <button class="copy-content-note copy-btn" data-id="${note.id}">C</button>
                    </div>`;
                card.addEventListener('touchstart', (e) => {
    // No preventDefault - scroll kaam karega
    if (!selectionMode && !isEmpty) {
        longPressTimer = setTimeout(() => {
            toggleSelectionMode();
            const noteId = note.id;
            selectedNotes.add(noteId);
            card.classList.add('selected');
            updateSelectionCount();
        }, 500);
    }
});

card.addEventListener('touchend', () => {
    clearTimeout(longPressTimer);
});

card.addEventListener('touchmove', () => {
    clearTimeout(longPressTimer);
});

// Click event mein preventDefault mat karo, sirf selection mode check karo
card.addEventListener('click', (e) => {
    if (selectionMode) {
        e.stopPropagation();
        toggleNoteSelection(note.id, card);
    } else {
        if (e.target.closest('.copy-title-note') || e.target.closest('.copy-content-note')) {
            return;
        }
        openFullscreenNote(note);
    }
});
            }
            container.appendChild(card);
        });
        document.querySelectorAll('.save-empty-btn').forEach(btn => {
            btn.onclick = () => {
                const id = btn.getAttribute('data-id');
                const found = notes.find(n => n.id === id);
                if(found && isEmptyNote(found)) {
                    const titleVal = document.getElementById(`editableTitle_${id}`).innerText.trim();
                    const contentVal = document.getElementById(`text_${id}`).value.trim();
                    if(contentVal) {
                        const finalTitle = titleVal || contentVal.split(/\r?\n/)[0].substring(0,40) || "Note";
                        notes.push({ id: Date.now()+'_'+Math.random(), folderId: currentFolderId, title: finalTitle, content: contentVal });
                        saveToLocal();
                        document.getElementById(`editableTitle_${id}`).innerText = '';
                        document.getElementById(`text_${id}`).value = '';
                        renderNotes();
                        
                    } else showToast("Write something");
                }
            };
        });
        document.querySelectorAll('.copy-title-inside').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.getAttribute('data-id');
                const titleDiv = document.getElementById(`editableTitle_${id}`);
                handleCopy(titleDiv?.innerText, btn);
            };
        });
        document.querySelectorAll('.paste-title-inside').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.getAttribute('data-id');
                const titleDiv = document.getElementById(`editableTitle_${id}`);
                if (titleDiv) {
                    try {
                        const text = await navigator.clipboard.readText();
                        if (text && text.trim()) {
                            titleDiv.innerText = text;
                            showToast("Pasted", true);
                        } else showToast("Empty");
                    } catch(e) { showToast("Allow permission"); }
                }
            };
        });
        document.querySelectorAll('.copy-text-inside').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.getAttribute('data-id');
                const textarea = document.getElementById(`text_${id}`);
                handleCopy(textarea?.value, btn);
            };
        });
        document.querySelectorAll('.paste-text-inside').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.getAttribute('data-id');
                const textarea = document.getElementById(`text_${id}`);
                if (textarea) {
                    try {
                        const text = await navigator.clipboard.readText();
                        if (text && text.trim()) {
                            textarea.value = text;
                            showToast("Pasted", true);
                        } else showToast("Empty");
                    } catch(e) { showToast("Allow permission"); }
                }
            };
        });
        document.querySelectorAll('.copy-title-note').forEach(btn => {
            btn.onclick = async (e) => {
                e.stopPropagation();
                const n = notes.find(x => x.id === btn.getAttribute('data-id'));
                handleCopy(n?.title, btn);
            };
        });
        document.querySelectorAll('.copy-content-note').forEach(btn => {
            btn.onclick = async (e) => {
                e.stopPropagation();
                const n = notes.find(x => x.id === btn.getAttribute('data-id'));
                handleCopy(n?.content, btn);
            };
        });
    }
    document.getElementById('selectAllBtn').onclick = () => {
        let allNotes = document.querySelectorAll('.note-item:not(.empty-note)');
        if(selectedNotes.size === allNotes.length && allNotes.length > 0) {
            selectedNotes.clear();
            allNotes.forEach(n => n.classList.remove('selected'));
        } else {
            allNotes.forEach(n => {
                let id = n.querySelector('.copy-title-note')?.getAttribute('data-id');
                if(id) { selectedNotes.add(id); n.classList.add('selected'); }
            });
        }
        updateSelectionCount();
    };
    document.getElementById('deleteSelectedBtn').onclick = () => {
        if(selectedNotes.size === 0) return showToast("No notes selected");
        if(confirm("Delete " + selectedNotes.size + " note(s)?")) {
            notes = notes.filter(n => !selectedNotes.has(n.id));
            saveToLocal();
            renderNotes();
            toggleSelectionMode();
            showToast("Deleted", true);
        }
    };
    document.getElementById('cancelSelectionBtn').onclick = toggleSelectionMode;
    function openFullscreenNote(note) {
        window.currentFullscreenNote = note;
        const div = document.createElement('div');
        div.className = 'fullscreen-modal';
        div.innerHTML = `<div class="fullscreen-header">
                <input id="fsTitle" value="${escapeHtml(note.title)}" placeholder="Title">
                <button class="fullscreen-close">X</button>
            </div>
            <div id="fsContent" class="fullscreen-content" contenteditable="true">${escapeHtml(note.content)}</div>`;
        document.body.appendChild(div);
        document.body.style.overflow = 'hidden';
        const close = div.querySelector('.fullscreen-close');
        const ti = div.querySelector('#fsTitle');
        const cd = div.querySelector('#fsContent');
        const saveFn = () => { 
            note.title = ti.value.trim() || "Note"; 
            note.content = cd.innerText; 
            saveToLocal(); 
            renderNotes(); 
            div.remove(); 
            document.body.style.overflow = ''; 
            window.currentFullscreenNote = null;
             
        };
        close.onclick = () => { 
            window.currentFullscreenNote = null;
            div.remove(); 
            document.body.style.overflow = ''; 
        };
        cd.addEventListener('keydown', (e) => { if((e.ctrlKey||e.metaKey) && (e.key==='Enter'||e.key==='s')) { e.preventDefault(); saveFn(); } });
        ti.addEventListener('keydown', (e) => { if((e.ctrlKey||e.metaKey) && (e.key==='Enter'||e.key==='s')) { e.preventDefault(); saveFn(); } });
    }
    function openEditModal(note) {
        const modal = document.createElement('div');
        modal.className = 'modal-mask';
        modal.innerHTML = `<div class="modal-card">
                <h3>Edit Note</h3>
                <input id="editTitle" value="${escapeHtml(note.title)}" placeholder="Title">
                <textarea id="editContent" rows="4" placeholder="Write your note...">${escapeHtml(note.content)}</textarea>
                <div class="modal-actions">
                    <button id="saveEdit" style="background:#2a2a2a; color:white;">Save</button>
                    <button id="cancelEdit" style="background:#333333;">Cancel</button>
                </div>
            </div>`;
        document.body.appendChild(modal);
        document.getElementById('saveEdit').onclick = () => { note.title = document.getElementById('editTitle').value.trim() || "Note"; note.content = document.getElementById('editContent').value; saveToLocal(); renderNotes(); modal.remove(); showToast("Updated", true); };
        document.getElementById('cancelEdit').onclick = () => modal.remove();
    }
    function fullRender() { renderFolders(); renderNotes(); }
    
    // Ctrl+S - Save from Title Box, Textarea, Fullscreen, AND Folder Dialog
    document.addEventListener('keydown', (e) => {
        if((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            const activeElement = document.activeElement;
            
            // Check for folder dialog input
            if(activeElement && activeElement.id === 'folderNameInput') {
                const createBtn = document.querySelector('#folderDialogCreate');
                if(createBtn) createBtn.click();
            }
            // Check for empty note textarea
            else if(activeElement && activeElement.id && activeElement.id.startsWith('text_')) {
                const id = activeElement.id.replace('text_', '');
                const btn = document.querySelector(`.save-empty-btn[data-id="${id}"]`);
                if(btn) btn.click();
            }
            // Check for title box (contenteditable)
            else if(activeElement && activeElement.id && activeElement.id.startsWith('editableTitle_')) {
                const id = activeElement.id.replace('editableTitle_', '');
                const btn = document.querySelector(`.save-empty-btn[data-id="${id}"]`);
                if(btn) btn.click();
            }
            // Check for fullscreen modal
            else if((activeElement && activeElement.id === 'fsTitle') || (activeElement && activeElement.id === 'fsContent')) {
                const note = window.currentFullscreenNote;
                if(note) {
                    const ti = document.getElementById('fsTitle');
                    const cd = document.getElementById('fsContent');
                    note.title = ti.value.trim() || "Note";
                    note.content = cd.innerText;
                    saveToLocal();
                    renderNotes();
                }
            }
        }
    });
    
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/my-notes-app/sw.js').catch(err => console.log('SW failed:', err));
    }
    loadFromLocal();
    fullRender();
</script>
</body>
</html>
